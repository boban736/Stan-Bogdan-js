<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Учет личных финансов</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="src/index.js" defer></script>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Учет финансов</h1>
      <button id="open-modal-btn" class="btn primary">Добавить операцию</button>
    </header>

    <section class="dashboard">
      <div class="card balance">
        <h3>Баланс</h3>
        <p id="total-balance">0 MDL</p>
      </div>
      <div class="card income">
        <h3>Доходы</h3>
        <p id="total-income">0 MDL</p>
      </div>
      <div class="card expense">
        <h3>Расходы</h3>
        <p id="total-expense">0 MDL</p>
      </div>
    </section>

    <section class="controls">
      <input type="text" id="search-input" placeholder="Поиск по описанию и категории...">
      <select id="filter-type">
        <option value="all">Все операции</option>
        <option value="income">Только доходы</option>
        <option value="expense">Только расходы</option>
      </select>
    </section>

    <section class="transactions-list">
      <h2>История транзакций</h2>
      <div id="transactions-container">
        <!-- Сюда будут добавляться элементы через JS -->
      </div>
      <p id="empty-message" class="hidden">Нет транзакций для отображения.</p>
    </section>
  </div>

  <!-- Модальное окно для добавления транзакции -->
  <div id="transaction-modal" class="modal hidden">
    <div class="modal-content">
      <span class="close-btn" id="close-modal-btn">&times;</span>
      <h2>Новая транзакция</h2>
      <form id="transaction-form">
        <div class="form-group">
          <label for="type">Тип:</label>
          <select id="type" required>
            <option value="expense">Расход</option>
            <option value="income">Доход</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="amount">Сумма (MDL):</label>
          <input type="number" id="amount" min="1" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="category">Категория:</label>
          <input type="text" id="category" required placeholder="Например: Продукты, Зарплата">
        </div>

        <div class="form-group">
          <label for="description">Описание:</label>
          <input type="text" id="description" placeholder="Краткое описание (необязательно)">
        </div>

        <div id="form-error" class="error-message"></div>
        
        <button type="submit" class="btn success">Сохранить</button>
      </form>
    </div>
  </div>
</body>
</html>
